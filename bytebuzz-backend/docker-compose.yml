version: "3.8"

services:
  mongo:
    image: mongo:5.0
    container_name: bytebuzz-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-db:/data/db
    networks:
      - app-network

  boot-app:
    image: bytebuzz-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/bytebuzz
    ports:
      - "9090:9090"
    depends_on:
      - mongo
    networks:
      - app-network

volumes:
  mongo-db:

networks:
  app-network:
